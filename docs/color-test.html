<!doctype html>
<html lang="en">
    <head>
        <title>It's an image comparison documentation</title>
        <meta name="description" content="documentation of 'It's an image comparison' web component">
        <meta name="keywords" content="its-an-image-comparison image comparison documentation">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width">
        <script type="module" src="dist/image-comparison.element.min.js?named=image-comparison" async></script>
        <script type="module" src="color-test.js" async></script>
        <link rel="stylesheet" href="code-example.css" p-inline>
        <link rel="stylesheet" href="doc.css" p-inline>
        <style>
            .rgb-block {
                display: inline-block;
                width: 2em;
                height: 2em;
                background-color: var(--bg);
            }
        </style>
    </head>
    <body>
        <div class="sidebar">

        <div class="toc">
            <div class="toc">
                <p><strong><a href=".">Documentation</a></strong></p>
                <p><strong><a href="contributing">How to contribute</a></strong></p>
                <p><strong>Color Diff comparison</strong></p>
                <template p-toc></template>

            </div>
        </div>
    </div>
    <div class="content">

        <h1 class="no-toc">
            It's an image comparison
        </h1>


        <section class="section section--badge">
            <a href="https://github.com/OmarCastro/its-an-image-comparison/blob/master/LICENSE" title="View license on repository" p-aria-label>
                <img src="reports/license-badge-a11y.svg" p-size p-badge-attrs="-title"></img>
            </a>
            <a href="reports/playwright-report" title="Show test results" p-aria-label>
                <img src="reports/test-results/test-results-badge-a11y.svg" p-size p-badge-attrs="-title"></img>
            </a>
            <a href="reports/coverage/final" title="Show test code coverage information" p-aria-label>
                <img src="reports/coverage/unit/coverage-badge-a11y.svg" p-size p-badge-attrs="-title"></img>
            </a>
            <a href="https://github.com/OmarCastro/its-an-image-comparison" title="View code repository" p-aria-label>
            </a>
            <a href="https://github.com/OmarCastro/its-an-image-comparison/releases/latest" title="View release notes" p-aria-label>
            </a>

        </section>

        <section class="section section--examples">



            <h2> Examples </h2>

            <template class="result-algorithms-table">
                <table>
                    <thead>
                        <colgroup>
                            <col class="col-algorithm"/>
                            <col class="col-delta"/>
                            <col class="col-max-delta"/>
                            <col class="col-theshold"/>
                        </colgroup>
                        <tr>
                            <th>Algorithm</th>
                            <th>delta</th>
                            <th>maxDelta</th>
                            <th>theshold value</th>
                        </tr>
                    </thead>
                    <tbody>

                    </tbody>
                </table>
            </template>

            <template class="result-algorithms-table-row">
                <tr>
                    <th class="col-algorithm"></th>
                    <td class="col-delta"></th>
                    <td class="col-max-delta"></th>
                    <td class="col-theshold"></th>
                </tr>
            </template>


            <div class="rgb-test">
                <div class="rgb-block rgb-block-1" style="--bg: rgb(41 56 157)"></div>
                <div class="rgb-block rgb-block-2" style="--bg: rgb(41 56 0)"></div>
                <div class="result-algoritms"></div>
            </div>

            <div class="rgb-test">
                <div class="rgb-block rgb-block-1" style="--bg: rgb(0 254 252)"></div>
                <div class="rgb-block rgb-block-2" style="--bg: rgb(94 254 252)"></div>
                <div class="result-algoritms"></div>
            </div>
    
        </section>

    </body>
</html>
