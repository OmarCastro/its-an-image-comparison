<!doctype html>
<html lang="en">
    <head>
        <title>It's an image comparison documentation</title>
        <meta name="description" content="documentation of 'It's an image comparison' web component">
        <meta name="keywords" content="its-an-image-comparison image comparison documentation">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width">
        <script type="module" src="dist/image-comparison.element.min.js?named=image-comparison" async></script>
        <script type="module" src="color-test.js" async></script>
        <link rel="stylesheet" href="code-example.css" p-inline>
        <link rel="stylesheet" href="doc.css" p-inline>
        <style>
            .rgb-block {
                display: inline-block;
                width: 2em;
                height: 2em;
                background-color: var(--bg);
            }
        </style>
    </head>
    <body>
        <div class="sidebar">

        <div class="toc">
            <div class="toc">
                <p><strong><a href=".">Documentation</a></strong></p>
                <p><strong><a href="contributing">How to contribute</a></strong></p>
                <p><strong>Color Diff comparison</strong></p>
                <template p-toc></template>

            </div>
        </div>
    </div>
    <div class="content">

        <h1 class="no-toc">
            It's an image comparison
        </h1>


        <section class="section section--examples">

            <h2> Examples </h2>

            <template class="result-algorithms-table">
                <style>
                    @scope {
                        .col-algorithm {
                            text-align: left;
                        }
                        .col-delta, .col-max-delta, .col-theshold {
                            text-align: right; 
                            td& { 
                                font-family: monospace;
                                font-size: 1.2em;
                            }
                        }

                    }
                </style>
                <table>
                    <colgroup>
                        <col class="col-algorithm"/>
                        <col class="col-delta"/>
                        <col class="col-max-delta"/>
                        <col class="col-theshold"/>
                    </colgroup>
                    <thead>
                        <tr>
                            <th scope="col" class="col-algorithm">Algorithm</th>
                            <th scope="col" class="col-delta">Delta</th>
                            <th scope="col" class="col-max-delta">Max delta</th>
                            <th scope="col" class="col-theshold">Threshold</th>
                        </tr>
                    </thead>
                    <tbody>

                    </tbody>
                </table>
            </template>

            <template class="result-algorithms-table-row">
                <tr>
                    <th class="col-algorithm" scope="row"></th>
                    <td class="col-delta"></th>
                    <td class="col-max-delta"></th>
                    <td class="col-theshold"></th>
                </tr>
            </template>


            <div class="rgb-test">
                <div class="rgb-block rgb-block-1" style="--bg: rgb(41 56 157)"></div>
                <div class="rgb-block rgb-block-2" style="--bg: rgb(41 56 0)"></div>
                <div class="result-algoritms"></div>
            </div>

            <div class="rgb-test">
                <div class="rgb-block rgb-block-1" style="--bg: rgb(0 254 252)"></div>
                <div class="rgb-block rgb-block-2" style="--bg: rgb(94 254 252)"></div>
                <div class="result-algoritms"></div>
            </div>
    
        </section>

    </body>
</html>
